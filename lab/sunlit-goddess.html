<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunlit Soft Dramatic Goddess — Color Palette</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(165deg, #0C2D3A 0%, #133B4A 30%, #1A4A5A 60%, #0E3040 100%);
    font-family: Georgia, 'Times New Roman', serif;
    position: relative;
    overflow-x: hidden;
  }

  .container {
    max-width: 920px;
    margin: 0 auto;
    padding: 32px 20px 60px;
    position: relative;
    z-index: 2;
  }

  /* Sparkles */
  .sparkle-canvas {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }

  .sparkle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.7);
    animation: sparkleFloat 2.5s ease-out forwards;
    pointer-events: none;
  }

  @keyframes sparkleFloat {
    0% { opacity: 0; transform: translateY(0) scale(0); }
    20% { opacity: 1; transform: translateY(-8px) scale(1); }
    80% { opacity: 0.6; transform: translateY(-30px) scale(0.8); }
    100% { opacity: 0; transform: translateY(-45px) scale(0); }
  }

  @keyframes titleGlow {
    0%, 100% { text-shadow: 0 0 20px rgba(212,175,106,0.3), 0 0 40px rgba(212,175,106,0.1); }
    50% { text-shadow: 0 0 30px rgba(212,175,106,0.5), 0 0 60px rgba(212,175,106,0.2); }
  }

  @keyframes subtitlePulse {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }

  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 2px 12px rgba(255,255,255,0.08); }
    50% { box-shadow: 0 4px 20px rgba(255,255,255,0.18); }
  }

  @keyframes copiedPop {
    0% { transform: scale(0.8); opacity: 0; }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Header */
  .header { text-align: center; margin-bottom: 36px; }

  .header-label {
    font-size: 11px;
    letter-spacing: 5px;
    color: #D4AF6A;
    text-transform: uppercase;
    margin-bottom: 10px;
    animation: subtitlePulse 3s ease-in-out infinite;
  }

  .header h1 {
    font-size: 32px;
    font-weight: 400;
    color: #F0E8D8;
    line-height: 1.2;
    animation: titleGlow 4s ease-in-out infinite;
  }

  .header-sub {
    font-size: 14px;
    color: rgba(212,175,106,0.6);
    margin-top: 8px;
    font-style: italic;
  }

  .header-line {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #D4AF6A, transparent);
    margin: 16px auto 0;
  }

  /* Filter Buttons */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-bottom: 28px;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 11px;
    letter-spacing: 0.5px;
    background: rgba(255,255,255,0.06);
    color: rgba(240,232,216,0.5);
    border: none;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s ease;
  }

  .filter-btn:hover { transform: translateY(-1px); }

  .filter-btn.active {
    background: rgba(212,175,106,0.25);
    color: #F0E8D8;
  }

  /* Color Groups */
  .color-group { margin-bottom: 36px; }

  .group-title {
    font-size: 18px;
    font-weight: 400;
    color: #F0E8D8;
    letter-spacing: 1px;
    margin-bottom: 3px;
  }

  .group-subtitle {
    font-size: 12px;
    color: rgba(212,175,106,0.5);
    font-style: italic;
    margin-bottom: 12px;
  }

  .color-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 10px;
  }

  .swatch {
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s ease;
    animation: pulseGlow 4s ease-in-out infinite;
    position: relative;
  }

  .swatch:hover {
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 8px 28px rgba(255,255,255,0.2) !important;
  }

  .swatch-color {
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .swatch-copied {
    animation: copiedPop 0.3s ease-out forwards;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .swatch-info {
    background: rgba(10,30,40,0.85);
    padding: 7px 8px;
  }

  .swatch-name {
    font-size: 10px;
    color: #D0C8B8;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .swatch-hex {
    font-size: 9px;
    color: rgba(180,170,155,0.6);
    font-family: monospace;
    margin-top: 1px;
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 40px;
    padding: 20px 0;
    border-top: 1px solid rgba(212,175,106,0.12);
  }

  .footer p {
    font-size: 12px;
    color: rgba(212,175,106,0.35);
    font-style: italic;
    line-height: 1.6;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: rgba(212,175,106,0.2);
    backdrop-filter: blur(12px);
    color: #F0E8D8;
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 12px;
    letter-spacing: 1px;
    pointer-events: none;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 100;
    border: 1px solid rgba(212,175,106,0.15);
  }

  .toast.visible {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
</style>

let activeCategory = null;

function getLuminance(hex) {
  const r = parseInt(hex.slice(1, 3), 16) / 255;
  const g = parseInt(hex.slice(3, 5), 16) / 255;
  const b = parseInt(hex.slice(5, 7), 16) / 255;
  return 0.299 * r + 0.587 * g + 0.114 * b;
}

function showToast(text) {
  const toast = document.getElementById('toast');
  toast.textContent = text;
  toast.classList.add('visible');
  setTimeout(() => toast.classList.remove('visible'), 1800);
}

function copyHex(hex, name) {
  navigator.clipboard.writeText(hex).then(() => {
    showToast(`${name} · ${hex} copied`);
  }).catch(() => {
    showToast(`${hex}`);
  });
}

function renderPalette() {
  const container = document.getElementById('paletteContainer');
  const data = activeCategory
    ? paletteData.filter(g => g.category === activeCategory)
    : paletteData;

  container.innerHTML = data.map(group => `
    <div class="color-group">
      <div class="group-title">${group.category}</div>
      <div class="group-subtitle">${group.subtitle}</div>
      <div class="color-grid">
        ${group.colors.map(color => {
          const isLight = getLuminance(color.hex) > 0.65;
          const delay = (Math.random() * 3).toFixed(1);
          return `
            <div class="swatch" onclick="copyHex('${color.hex}', '${color.name.replace(/'/g, "\\'")}')"
                 style="animation-delay: ${delay}s">
              <div class="swatch-color" style="background: ${color.hex}"></div>
              <div class="swatch-info">
                <div class="swatch-name">${color.name}</div>
                <div class="swatch-hex">${color.hex}</div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `).join('');
}

function renderFilters() {
  const container = document.getElementById('filters');
  const categories = ['All', ...paletteData.map(g => g.category)];

  container.innerHTML = categories.map(cat => {
    const isActive = (cat === 'All' && !activeCategory) || cat === activeCategory;
    return `
      <button class="filter-btn ${isActive ? 'active' : ''}"
              onclick="setFilter('${cat === 'All' ? '' : cat.replace(/'/g, "\\'")}')">${cat}</button>
    `;
  }).join('');
}

function setFilter(cat) {
  activeCategory = cat || null;
  renderFilters();
  renderPalette();
}

// Sparkle system
function createSparkle() {
  const canvas = document.getElementById('sparkleCanvas');
  const sparkle = document.createElement('div');
  sparkle.className = 'sparkle';
  const size = Math.random() * 3 + 1;
  sparkle.style.width = size + 'px';
  sparkle.style.height = size + 'px';
  sparkle.style.left = Math.random() * 100 + '%';
  sparkle.style.top = Math.random() * 100 + '%';
  sparkle.style.boxShadow = `0 0 ${size * 3}px rgba(212,175,106,0.4)`;
  sparkle.style.animationDelay = (Math.random() * 0.5) + 's';
  canvas.appendChild(sparkle);
  setTimeout(() => sparkle.remove(), 3000);
}

setInterval(createSparkle, 300);

// Init
renderFilters();
renderPalette();
